name: Build iOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Capacitor
      run: npm install @capacitor/core @capacitor/cli @capacitor/ios
    
    - name: Build web app
      run: npm run build
    
    - name: Initialize Capacitor
      run: |
        npx cap init fit-abb com.fitabb.app --web-dir=dist
        npx cap add ios
    
    - name: Sync Capacitor
      run: npx cap sync ios
    
    - name: Build iOS App
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive
    
    - name: Upload iOS Build
      uses: actions/upload-artifact@v3
      with:
        name: iOS-App
        path: ios/App/build/App.xcarchive